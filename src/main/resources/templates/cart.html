<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shopping Cart - Pizzeria</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Arial', sans-serif;
		}

		html {
			font-size: 62.5%;
			overflow-x: hidden;
			scroll-behavior: smooth;
		}

		body {
			background-image: url('/pictures/cart_background_image.jpg');
			background-repeat: no-repeat;
			background-position: center;
			background-size: cover;
			background-attachment: fixed;
			min-height: 100vh;
			padding-top: 80px;
		}

		/* Header Styles */
		.header {
			position: fixed;
			top: 0;
			right: 0;
			left: 0;
			background-color: rgba(252, 154, 154, 0.95);
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
			z-index: 999;
			backdrop-filter: blur(10px);
		}

		.header .flex {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 1rem 2rem;
			max-width: 1200px;
			margin: 0 auto;
		}

		.header .logo {
			font-size: 2.5rem;
			font-weight: bold;
			color: #000;
		}

		.header .navbar {
			display: flex;
			gap: 2rem;
			align-items: center;
		}

		.header .navbar a {
			font-size: 2.3rem;
			color: #000;
			text-decoration: none;
			padding: 0.5rem 1rem;
			border-radius: 0.5rem;
			transition: all 0.3s ease;
		}

		.header .navbar a:hover {
			background-color: rgba(255, 255, 255, 0.3);
			transform: translateY(-2px);
		}

		/* Main Container */
		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 3rem 2rem;
		}

		.cart-header {
			text-align: center;
			color: white;
			margin-bottom: 3rem;
		}

		.cart-header h1 {
			font-size: 4rem;
			text-transform: uppercase;
			margin-bottom: 1rem;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
		}

		.cart-header p {
			font-size: 1.8rem;
			opacity: 0.9;
		}

		/* Cart Content */
		.cart-content {
			display: grid;
			grid-template-columns: 2fr 1fr;
			gap: 2rem;
			margin-top: 3rem;
		}

		/* Cart Items Section */
		.cart-items-section {
			background: white;
			border-radius: 1.5rem;
			padding: 2rem;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
		}

		.cart-items-section h2 {
			font-size: 2.5rem;
			margin-bottom: 2rem;
			color: #333;
			border-bottom: 3px solid #fc9a9a;
			padding-bottom: 1rem;
		}

		.empty-cart {
			text-align: center;
			padding: 3rem;
			color: #999;
		}

		.empty-cart img {
			width: 150px;
			margin-bottom: 1rem;
			opacity: 0.5;
		}

		.empty-cart p {
			font-size: 1.8rem;
			margin-bottom: 1rem;
		}

		/* Cart Item Card */
		.cart-item {
			display: grid;
			grid-template-columns: 1fr 3fr 1fr;
			gap: 1.5rem;
			align-items: center;
			padding: 1.5rem;
			border: 2px solid #f0f0f0;
			border-radius: 1rem;
			margin-bottom: 1.5rem;
			background: #f9f9f9;
			transition: all 0.3s ease;
		}

		.cart-item:hover {
			border-color: #fc9a9a;
			box-shadow: 0 5px 15px rgba(252, 154, 154, 0.1);
		}

		.cart-item img {
			width: 100%;
			height: 150px;
			object-fit: cover;
			border-radius: 0.8rem;
		}

		.item-details {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}

		.item-details h3 {
			font-size: 1.8rem;
			color: #333;
			text-transform: capitalize;
		}

		.item-details p {
			font-size: 1.4rem;
			color: #666;
		}

		.item-price {
			font-size: 1.6rem;
			font-weight: bold;
			color: #fc9a9a;
		}

		.item-actions {
			display: flex;
			flex-direction: column;
			gap: 1rem;
		}

		.quantity-control {
			display: flex;
			gap: 0.5rem;
			align-items: center;
			justify-content: center;
		}

		.quantity-control form {
			display: flex;
			gap: 0.5rem;
			width: 100%;
		}

		.quantity-control input[type="number"] {
			width: 70px;
			padding: 0.5rem;
			border: 1px solid #ddd;
			border-radius: 0.4rem;
			font-size: 1.4rem;
			text-align: center;
		}

		.quantity-control button {
			padding: 0.5rem 1rem;
			background-color: #fc9a9a;
			color: white;
			border: none;
			border-radius: 0.4rem;
			cursor: pointer;
			font-size: 1.2rem;
			transition: all 0.3s ease;
		}

		.quantity-control button:hover {
			background-color: #fa6c6c;
			transform: scale(1.05);
		}

		.remove-btn {
			padding: 0.8rem 1.5rem;
			background-color: #e74c3c;
			color: white;
			border: none;
			border-radius: 0.4rem;
			cursor: pointer;
			font-size: 1.4rem;
			transition: all 0.3s ease;
			width: 100%;
		}

		.remove-btn:hover {
			background-color: #c0392b;
			transform: scale(1.05);
		}

		/* Summary Section */
		.cart-summary {
			background: white;
			border-radius: 1.5rem;
			padding: 2rem;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
			height: fit-content;
			position: sticky;
			top: 100px;
		}

		.summary-heading {
			font-size: 2.2rem;
			color: #333;
			margin-bottom: 1.5rem;
			border-bottom: 3px solid #fc9a9a;
			padding-bottom: 1rem;
		}

		.summary-item {
			display: flex;
			justify-content: space-between;
			font-size: 1.5rem;
			margin-bottom: 1rem;
			color: #666;
		}

		.summary-item.total {
			font-size: 1.8rem;
			font-weight: bold;
			color: #333;
			border-top: 2px solid #f0f0f0;
			padding-top: 1rem;
			margin-top: 1rem;
		}

		.summary-item.total span {
			color: #fc9a9a;
		}

		.checkout-btn {
			width: 100%;
			padding: 1.2rem;
			background: linear-gradient(135deg, #fc9a9a, #fa6c6c);
			color: white;
			border: none;
			border-radius: 0.8rem;
			font-size: 1.6rem;
			font-weight: bold;
			cursor: pointer;
			margin-top: 2rem;
			transition: all 0.3s ease;
			text-transform: uppercase;
		}

		.checkout-btn:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 20px rgba(252, 154, 154, 0.3);
		}

		.checkout-btn:disabled {
			background: #ccc;
			cursor: not-allowed;
			transform: none;
		}

		.continue-shopping-btn {
			width: 100%;
			padding: 1rem;
			background-color: rgba(252, 154, 154, 0.95);
			color: white;
			border: none;
			border-radius: 0.8rem;
			font-size: 1.5rem;
			cursor: pointer;
			margin-top: 1rem;
			transition: all 0.3s ease;
			text-decoration: none;
			text-align: center;
			display: block;
		}

		.continue-shopping-btn:hover {
			background-color: red;
			transform: translateY(-2px);
		}

		/* Responsive */
		@media (max-width: 768px) {
			.cart-content {
				grid-template-columns: 1fr;
			}

			.cart-item {
				grid-template-columns: 80px 1fr;
			}

			.item-actions {
				grid-column: 1 / -1;
				flex-direction: row;
				gap: 1rem;
			}

			.cart-summary {
				position: static;
				top: auto;
			}

			.header .flex {
				flex-direction: column;
				gap: 1rem;
			}

			.header .navbar {
				gap: 1rem;
			}
		}

		.alert {
			padding: 1rem;
			margin-bottom: 1.5rem;
			border-radius: 0.5rem;
			font-size: 1.4rem;
		}

		.alert-danger {
			background-color: #f8d7da;
			color: #721c24;
			border: 1px solid #f5c6cb;
		}

		.alert-success {
			background-color: #d4edda;
			color: #155724;
			border: 1px solid #c3e6cb;
		}
	</style>
</head>

<body>

	<!-- Header/Navigation -->
	<header class="header">
		<section class="flex">
			<div class="logo">🍕 Pizzeria</div>
			<nav class="navbar">
				<a th:href="@{/index}">Home</a>
				<a th:href="@{/menu}">Menu</a>
				<a th:href="@{/order/view}">Orders</a>
				<a th:href="@{/cart/view}">Cart</a>
				<a th:href="@{/logout}">Logout</a>
			</nav>
		</section>
	</header>

	<!-- Main Container -->
	<div class="container">
		<div class="cart-header">
			<h1>Shopping Cart</h1>
			<p th:if="${cartItems != null && cartItems.size() > 0}" th:text="'Items in cart: ' + ${cartItems.size()}">
			</p>
		</div>

		
		<div th:if="${param.error}" class="alert alert-danger">
			<span th:text="${param.error}"></span>
		</div>
		<div th:if="${param.success}" class="alert alert-success">
			<span th:text="${param.success}"></span>
		</div>


		<div class="cart-content">
			<!-- Cart Items Section -->
			<div class="cart-items-section">
				<h2>Your Items</h2>

				<div th:if="${cartItems == null || cartItems.size() == 0}" class="empty-cart">
					<p>Your cart is empty</p>
					<a th:href="@{/menu}" class="continue-shopping-btn">Continue Shopping</a>
				</div>

				<div th:if="${cartItems != null && cartItems.size() > 0}">
					<div th:each="item : ${cartItems}" class="cart-item">
						<!-- Pizza Image -->
						<div>
							<img th:src="${item.pizza.imageUrl}" th:alt="${item.pizza.pizzaName}"
								onerror="this.src='https://via.placeholder.com/150'">
						</div>

						<!-- Item Details -->
						<div class="item-details">
							<h3 th:text="${item.pizza.pizzaName}"></h3>
							<p class="item-price">Price: ₹<span
									th:text="${#numbers.formatDecimal(item.price, 1, 2)}"></span></p>
							<p th:text="'Category: ' + ${item.pizza.category}"></p>
							<p class="item-price" style="font-size: 1.5rem; margin-top: 0.5rem;">
								Subtotal: ₹<span th:text="${#numbers.formatDecimal(item.total, 1, 2)}"></span>
							</p>
						</div>

						<!-- Item Actions -->
						<div class="item-actions">
							<div class="quantity-control">
								<form th:action="@{/cart/update/{id}(id=${item.cartItemId})}" method="post"
									style="display: flex; gap: 0.5rem;">
									<input type="number" name="quantity" th:value="${item.quantity}" min="1" max="100">
									<button type="submit">Update</button>
								</form>
							</div>
							<form th:action="@{/cart/remove/{id}(id=${item.cartItemId})}" method="post">
								<button type="submit" class="remove-btn">Remove</button>
							</form>
						</div>
					</div>

					<!-- Continue Shopping -->
					<a th:href="@{/menu}" class="continue-shopping-btn">+ Add More Items</a>
				</div>
			</div>

			<!-- Summary Section -->
			<div class="cart-summary">
				<h2 class="summary-heading">Order Summary</h2>

				<div th:if="${cartItems != null && cartItems.size() > 0}">
					<div class="summary-item">
						<span>Items in Cart:</span>
						<span th:text="${totalItems}"></span>
					</div>
					<div class="summary-item">
						<span>Subtotal:</span>
						<span>₹<span th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}"></span></span>
					</div>
					<div class="summary-item">
						<span>Delivery Fee:</span>
						<span>₹50</span>
					</div>
					<div class="summary-item">
						<span>Tax (5%):</span>
						<span>₹<span th:text="${#numbers.formatDecimal(totalPrice * 0.05, 1, 2)}"></span></span>
					</div>
					<div class="summary-item total">
						<span>Total Amount:</span>
						<span>₹<span
								th:text="${#numbers.formatDecimal(totalPrice + 50 + (totalPrice * 0.05), 1, 2)}"></span></span>
					</div>

					<form th:action="@{/order/checkout}" method="get">
						<button type="submit" class="checkout-btn">Proceed to Checkout</button>
					</form>
				</div>

				<div th:if="${cartItems == null || cartItems.size() == 0}">
					<p style="text-align: center; color: #999; font-size: 1.5rem;">Cart is empty</p>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
