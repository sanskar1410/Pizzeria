<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Checkout - Pizzeria</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Arial', sans-serif;
		}

		html {
			font-size: 62.5%;
			overflow-x: hidden;
			scroll-behavior: smooth;
		}

		body {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding-top: 80px;
		}

		/* Header Styles */
		.header {
			position: fixed;
			top: 0;
			right: 0;
			left: 0;
			background-color: rgba(252, 154, 154, 0.95);
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
			z-index: 999;
		}

		.header .flex {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 1rem 2rem;
			max-width: 1200px;
			margin: 0 auto;
		}

		.header .logo {
			font-size: 2.5rem;
			font-weight: bold;
			color: #000;
		}

		.header .navbar {
			display: flex;
			gap: 2rem;
			align-items: center;
		}

		.header .navbar a {
			font-size: 1.6rem;
			color: #000;
			text-decoration: none;
			transition: all 0.3s ease;
		}

		.header .navbar a:hover {
			color: white;
			text-decoration: underline;
		}

		/* Main Container */
		.container {
			max-width: 900px;
			margin: 0 auto;
			padding: 3rem 2rem;
		}

		.checkout-header {
			text-align: center;
			color: white;
			margin-bottom: 3rem;
		}

		.checkout-header h1 {
			font-size: 4rem;
			text-transform: uppercase;
			margin-bottom: 1rem;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
		}

		/* Form Container */
		.checkout-form {
			background: white;
			border-radius: 1.5rem;
			padding: 3rem;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
		}

		.form-section {
			margin-bottom: 2.5rem;
		}

		.form-section h2 {
			font-size: 2rem;
			color: #333;
			margin-bottom: 1.5rem;
			padding-bottom: 0.8rem;
			border-bottom: 3px solid #fc9a9a;
		}

		.form-group {
			margin-bottom: 1.5rem;
		}

		.form-group label {
			display: block;
			font-size: 1.5rem;
			color: #333;
			margin-bottom: 0.5rem;
			font-weight: bold;
		}

		.form-group input,
		.form-group textarea {
			width: 100%;
			padding: 1rem;
			font-size: 1.4rem;
			border: 2px solid #ddd;
			border-radius: 0.8rem;
			font-family: 'Arial', sans-serif;
			transition: all 0.3s ease;
		}

		.form-group input:focus,
		.form-group textarea:focus {
			outline: none;
			border-color: #fc9a9a;
			box-shadow: 0 0 0 3px rgba(252, 154, 154, 0.1);
		}

		.form-group textarea {
			resize: vertical;
			min-height: 100px;
		}

		/* User Info Display */
		.user-info {
			background: #f9f9f9;
			padding: 1.5rem;
			border-radius: 0.8rem;
			margin-bottom: 1.5rem;
			border-left: 4px solid #fc9a9a;
		}

		.user-info p {
			font-size: 1.4rem;
			color: #555;
			margin-bottom: 0.5rem;
		}

		.user-info strong {
			color: #333;
		}

		/* Order Summary */
		.order-summary {
			background: #f9f9f9;
			padding: 1.5rem;
			border-radius: 0.8rem;
			border: 2px solid #fc9a9a;
		}

		.summary-row {
			display: flex;
			justify-content: space-between;
			font-size: 1.5rem;
			margin-bottom: 0.8rem;
			color: #555;
		}

		.summary-row.total {
			font-size: 1.8rem;
			font-weight: bold;
			color: #333;
			border-top: 2px solid #ddd;
			padding-top: 0.8rem;
			margin-top: 0.8rem;
		}

		.summary-row.total span:last-child {
			color: #fc9a9a;
		}

		/* Button Group */
		.button-group {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1rem;
			margin-top: 2.5rem;
		}

		.btn {
			padding: 1.2rem;
			border: none;
			border-radius: 0.8rem;
			font-size: 1.6rem;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.3s ease;
			text-transform: uppercase;
		}

		.btn-submit {
			background: linear-gradient(135deg, #fc9a9a, #fa6c6c);
			color: white;
		}

		.btn-submit:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 20px rgba(252, 154, 154, 0.3);
		}

		.btn-cancel {
			background-color: #ddd;
			color: #333;
		}

		.btn-cancel:hover {
			background-color: #bbb;
		}

		/* Responsive */
		@media (max-width: 768px) {
			.button-group {
				grid-template-columns: 1fr;
			}

			.checkout-form {
				padding: 1.5rem;
			}

			.checkout-header h1 {
				font-size: 2.5rem;
			}
		}

		.alert {
			padding: 1rem;
			margin-bottom: 1.5rem;
			border-radius: 0.5rem;
			font-size: 1.4rem;
		}

		.alert-danger {
			background-color: #f8d7da;
			color: #721c24;
			border: 1px solid #f5c6cb;
		}

		.alert-success {
			background-color: #d4edda;
			color: #155724;
			border: 1px solid #c3e6cb;
		}
	</style>
</head>

<body>

	<!-- Header/Navigation -->
	<header class="header">
		<section class="flex">
			<div class="logo">🍕 Pizzeria</div>
			<nav class="navbar">
				<a th:href="@{/index}">Home</a>
				<a th:href="@{/menu}">Menu</a>
				<a th:href="@{/order/view}">Orders</a>
				<a th:href="@{/cart/view}">Cart</a>
				<a th:href="@{/logout}">Logout</a>
			</nav>
		</section>
	</header>

	<!-- Main Container -->
	<div class="container">
		<div class="checkout-header">
			<h1>Checkout</h1>
			<p>Complete Your Order</p>
		</div>

		<!-- Error Messages -->
		<div th:if="${param.error}" class="alert alert-danger">
			<span th:text="${param.error}"></span>
		</div>

		<!-- Checkout Form -->
		<form th:action="@{/order/place}" method="post" class="checkout-form">
			
			<!-- User Information Section -->
			<div class="form-section">
				<h2>Your Information</h2>
				<div class="user-info">
					<p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
					<p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
				</div>
			</div>

			<!-- Delivery Information Section -->
			<div class="form-section">
				<h2>Delivery Details</h2>

				<div class="form-group">
					<label for="deliveryAddress">Delivery Address</label>
					<textarea id="deliveryAddress" name="deliveryAddress" 
						placeholder="Enter your complete delivery address" required></textarea>
				</div>

				<div class="form-group">
					<label for="phoneNumber">Phone Number</label>
					<input type="tel" id="phoneNumber" name="phoneNumber" 
						placeholder="Enter your phone number" pattern="[0-9]{10}" required>
				</div>
			</div>

			<!-- Order Summary Section -->
			<div class="form-section">
				<h2>Order Summary</h2>
				<div class="order-summary">
					<div class="summary-row">
						<span>Subtotal:</span>
						<span>₹<span th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}"></span></span>
					</div>
					<div class="summary-row">
						<span>Delivery Fee:</span>
						<span>₹50.00</span>
					</div>
					<div class="summary-row">
						<span>Tax (5%):</span>
						<span>₹<span th:text="${#numbers.formatDecimal(totalPrice * 0.05, 1, 2)}"></span></span>
					</div>
					<div class="summary-row total">
						<span>Total Amount:</span>
						<span>₹<span th:text="${#numbers.formatDecimal(totalPrice + 50 + (totalPrice * 0.05), 1, 2)}"></span></span>
					</div>
				</div>
			</div>

			<!-- Button Group -->
			<div class="button-group">
				<a th:href="@{/cart/view}" class="btn btn-cancel">Back to Cart</a>
				<button type="submit" class="btn btn-submit">Place Order</button>
			</div>
		</form>
	</div>

</body>

</html>
